<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChannelScale</title>
    <meta name="description"
        content="ChannelScale scales YouTube presence for personal brands and founders through data-driven strategy and high-retention production.">

    <!-- Open Graph (LinkedIn / iMessage / etc) -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="ChannelScale | The Operating System for YouTube Growth">
    <meta property="og:description"
        content="ChannelScale scales YouTube presence for personal brands and founders through data-driven strategy and high-retention production.">
    <meta property="og:image" content="/Website%20Preview.jpg">
    <meta property="og:image:alt" content="ChannelScale - The Operating System for YouTube Growth">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="ChannelScale | The Operating System for YouTube Growth">
    <meta name="twitter:description"
        content="ChannelScale scales YouTube presence for personal brands and founders through data-driven strategy and high-retention production.">
    <meta name="twitter:image" content="/Website%20Preview.jpg">
    <link rel="icon" type="image/svg+xml"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><circle cx=%2250%22 cy=%2250%22 r=%2250%22 fill=%22%23FD0033%22/></svg>">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        obsidian: '#0A0A0B',
                        signal: '#FD0033',
                        steel: '#E2E8F0',
                    },
                    fontFamily: {
                        heading: ['"Inter Tight"', 'sans-serif'],
                        emphasis: ['"Bebas Neue"', 'sans-serif'],
                        data: ['"JetBrains Mono"', 'monospace'],
                        body: ['"Inter"', 'sans-serif'],
                    },
                    backgroundImage: {
                        'grid-pattern': 'linear-gradient(to right, rgba(255,255,255,0.05) 1px, transparent 1px), linear-gradient(to bottom, rgba(255,255,255,0.05) 1px, transparent 1px)'
                    }
                }
            }
        }
    </script>

    <style type="text/tailwindcss">
        @layer utilities {
            .analog-grain {
                position: fixed;
                top: 0; left: 0; width: 100%; height: 100%;
                pointer-events: none;
                z-index: 50;
                opacity: 0.05;
                background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            }
            .glass-panel {
                background: rgba(255, 255, 255, 0.03);
                backdrop-filter: blur(20px);
                border: 1px solid rgba(255, 255, 255, 0.05);
            }
            .btn-magnetic {
                transition: transform 0.2s cubic-bezier(0.25, 1, 0.5, 1);
            }
            .btn-magnetic:hover {
                transform: scale(1.05);
            }
            .no-scrollbar::-webkit-scrollbar {
                display: none;
            }
            .no-scrollbar {
                -ms-overflow-style: none;
                scrollbar-width: none;
            }
        }
    </style>

    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter+Tight:wght@800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;700&display=swap"
        rel="stylesheet">

    <!-- React & ReactDOM (Using React 18 for Babel compatibility over CDN) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

    <!-- Babel for browser JSX compilation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- GSAP for Animations -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="bg-obsidian text-steel font-body antialiased overflow-x-hidden selection:bg-signal selection:text-white">
    <!-- Global Analog Grain Overlay -->
    <div class="analog-grain"></div>

    <div id="root"></div>

    <script type="text/babel">
        // Register GSAP plugins
        gsap.registerPlugin(ScrollTrigger);

        const { useState, useEffect, useRef, useLayoutEffect } = React;

        const App = () => {
            const [currentPage, setCurrentPage] = useState('home');

            useEffect(() => {
                // Initialize icons
                lucide.createIcons();
                window.scrollTo(0, 0); // scroll to top when page changes
            }, [currentPage]);

            const navigateToForm = () => {
                setCurrentPage('home');
                setTimeout(() => {
                    const formEl = document.getElementById('intake-form');
                    if (formEl) {
                        formEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
                    }
                }, 100);
            };

            return (
                <div className="relative w-full">
                    {/* Architectural Grid Background */}
                    <div className="fixed inset-0 bg-grid-pattern bg-[size:40px_40px] pointer-events-none opacity-20"></div>

                    <NavBar setCurrentPage={setCurrentPage} currentPage={currentPage} navigateToForm={navigateToForm} />

                    {currentPage === 'home' ? (
                        <>
                            <HeroSection />
                            <PortfolioSection />
                            <StrategicIntakeSection />
                            <FeaturesSection />
                            <WhoThisIsForSection />
                            <ManifestoSection />
                            <ProtocolSection />
                        </>
                    ) : currentPage === 'about' ? (
                        <AboutPage setCurrentPage={setCurrentPage} navigateToForm={navigateToForm} />
                    ) : currentPage === 'faq' ? (
                        <FAQPage setCurrentPage={setCurrentPage} navigateToForm={navigateToForm} />
                    ) : currentPage === 'privacy' ? (
                        <PrivacyPolicyPage setCurrentPage={setCurrentPage} />
                    ) : currentPage === 'terms' ? (
                        <TermsOfServicePage setCurrentPage={setCurrentPage} />
                    ) : currentPage === 'disclaimer' ? (
                        <DisclaimerPage setCurrentPage={setCurrentPage} />
                    ) : (
                        <SystemConfigurationsPage setCurrentPage={setCurrentPage} navigateToForm={navigateToForm} />
                    )}

                    <SiteFooter setCurrentPage={setCurrentPage} />
                </div>
            );
        };

        const NavBar = ({ setCurrentPage, currentPage, navigateToForm }) => {
            const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);

            const handleNavClick = (page) => {
                setCurrentPage(page);
                setIsMobileMenuOpen(false);
            };

            const handleInitializeClick = () => {
                if (navigateToForm) {
                    navigateToForm();
                } else {
                    setCurrentPage('home');
                }
                setIsMobileMenuOpen(false);
            };

            return (
                <>
                    <nav className="fixed top-0 w-full z-40 p-4 md:p-6 flex justify-between items-center glass-panel border-b border-t-0 border-x-0 !border-white/10 mix-blend-plus-lighter bg-obsidian/90 backdrop-blur-lg">
                        <div className="flex items-center gap-2 md:gap-3 cursor-pointer flex-shrink-0" onClick={() => handleNavClick('home')}>
                            <div className="w-3 h-3 rounded-full bg-signal shadow-[0_0_15px_#FD0033] animate-pulse flex-shrink-0"></div>
                            <span className="font-heading font-extrabold text-base md:text-xl tracking-tighter text-white hover:text-white/80 transition-colors flex-shrink-0">CHANNELSCALE</span>
                        </div>

                        {/* Desktop Navigation */}
                        <div className="hidden md:flex items-center gap-6 justify-end w-full pl-4">
                            <button
                                onClick={() => handleNavClick('home')}
                                className={`font-data text-sm uppercase tracking-widest transition-colors hover:text-[#FD0033] focus:outline-none whitespace-nowrap ${currentPage === 'home' ? 'text-[#FD0033] drop-shadow-[0_0_8px_rgba(253,0,51,0.5)]' : 'text-white/60'}`}
                            >
                                [HOME_BASE]
                            </button>
                            <button
                                onClick={() => handleNavClick('faq')}
                                className={`font-data text-sm uppercase tracking-widest transition-colors hover:text-[#FD0033] focus:outline-none whitespace-nowrap ${currentPage === 'faq' ? 'text-[#FD0033] drop-shadow-[0_0_8px_rgba(253,0,51,0.5)]' : 'text-white/60'}`}
                            >
                                [FAQ]
                            </button>
                            <button
                                onClick={() => handleNavClick('services')}
                                className={`font-data text-sm uppercase tracking-widest transition-colors hover:text-[#FD0033] focus:outline-none whitespace-nowrap flex-shrink-0 ${currentPage === 'services' ? 'text-[#FD0033] drop-shadow-[0_0_8px_rgba(253,0,51,0.5)]' : 'text-white/60'}`}
                            >
                                [CONFIGURATIONS]
                            </button>
                            <button
                                onClick={() => handleNavClick('about')}
                                className={`font-data text-sm uppercase tracking-widest transition-colors hover:text-[#FD0033] focus:outline-none whitespace-nowrap flex-shrink-0 ${currentPage === 'about' ? 'text-[#FD0033] drop-shadow-[0_0_8px_rgba(253,0,51,0.5)]' : 'text-white/60'}`}
                            >
                                [DIRECTOR]
                            </button>
                            <button onClick={handleInitializeClick} className="btn-magnetic group relative overflow-hidden px-6 py-3 rounded-full border border-signal text-signal hover:text-obsidian transition-colors flex-shrink-0">
                                <span className="relative z-10 font-data text-sm font-bold uppercase tracking-wider">Initialize</span>
                                <div className="absolute inset-0 bg-signal translate-y-[100%] group-hover:translate-y-0 transition-transform duration-300 ease-out z-0"></div>
                            </button>
                        </div>

                        {/* Mobile Menu Toggle Button */}
                        <div className="flex md:hidden items-center justify-end w-full pl-4">
                            <button
                                onClick={() => setIsMobileMenuOpen(!isMobileMenuOpen)}
                                className="text-white hover:text-[#FD0033] transition-colors focus:outline-none p-2"
                            >
                                {isMobileMenuOpen ? (
                                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                                ) : (
                                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
                                )}
                            </button>
                        </div>
                    </nav>

                    {/* Mobile Dropdown Panel */}
                    <div className={`fixed top-[64px] left-0 w-full bg-obsidian/95 backdrop-blur-xl border-b border-white/10 z-30 md:hidden flex flex-col items-center py-6 shadow-2xl transition-all duration-300 origin-top overflow-hidden ${isMobileMenuOpen ? 'max-h-[500px] opacity-100' : 'max-h-0 opacity-0 pointer-events-none'}`}>
                        <button
                            onClick={() => handleNavClick('home')}
                            className={`font-data text-sm uppercase tracking-widest transition-colors hover:text-[#FD0033] focus:outline-none py-4 w-full text-center border-b border-white/5 ${currentPage === 'home' ? 'text-[#FD0033]' : 'text-white/60'}`}
                        >
                            [HOME_BASE]
                        </button>
                        <button
                            onClick={() => handleNavClick('faq')}
                            className={`font-data text-sm uppercase tracking-widest transition-colors hover:text-[#FD0033] focus:outline-none py-4 w-full text-center border-b border-white/5 ${currentPage === 'faq' ? 'text-[#FD0033]' : 'text-white/60'}`}
                        >
                            [FAQ]
                        </button>
                        <button
                            onClick={() => handleNavClick('services')}
                            className={`font-data text-sm uppercase tracking-widest transition-colors hover:text-[#FD0033] focus:outline-none py-4 w-full text-center border-b border-white/5 ${currentPage === 'services' ? 'text-[#FD0033]' : 'text-white/60'}`}
                        >
                            [CONFIGURATIONS]
                        </button>
                        <button
                            onClick={() => handleNavClick('about')}
                            className={`font-data text-sm uppercase tracking-widest transition-colors hover:text-[#FD0033] focus:outline-none py-4 w-full text-center border-b border-white/5 ${currentPage === 'about' ? 'text-[#FD0033]' : 'text-white/60'}`}
                        >
                            [DIRECTOR]
                        </button>
                        <div className="pt-6 pb-2 w-full px-8 flex justify-center">
                            <button onClick={handleInitializeClick} className="w-full max-w-xs group relative overflow-hidden px-4 py-3 rounded-full border border-signal text-signal hover:text-obsidian transition-colors">
                                <span className="relative z-10 font-data text-sm font-bold uppercase tracking-wider">Initialize</span>
                                <div className="absolute inset-0 bg-signal translate-y-[100%] group-hover:translate-y-0 transition-transform duration-300 ease-out z-0"></div>
                            </button>
                        </div>
                    </div>
                </>
            );
        }

        const AboutPage = ({ setCurrentPage, navigateToForm }) => {
            const pageRef = useRef(null);

            useLayoutEffect(() => {
                let ctx = gsap.context(() => {
                    gsap.from(".about-animate", {
                        y: 30,
                        opacity: 0,
                        duration: 0.8,
                        stagger: 0.15,
                        ease: "power3.out"
                    });
                }, pageRef);
                return () => ctx.revert();
            }, []);

            return (
                <section ref={pageRef} className="min-h-screen pt-32 pb-24 px-4 md:px-12 relative z-10 bg-[#0D0D0D] text-[#F8FAFC]">
                    <div className="max-w-5xl mx-auto">

                        {/* Hero Section (Identity Profile) */}
                        <div className="about-animate grid grid-cols-1 md:grid-cols-2 gap-12 items-center mb-24 border-b border-white/10 pb-16">
                            {/* Left Column: Headshot */}
                            <div className="relative w-full max-w-sm mx-auto md:mx-0 aspect-[4/5] rounded-xl overflow-hidden border border-white/20 shadow-[0_0_50px_rgba(253,0,51,0.15)] group">
                                <div className="absolute inset-0 bg-[#FD0033] mix-blend-overlay opacity-10 z-10 pointer-events-none"></div>
                                <img src="./3E5C90F3-62AE-4184-BF92-2681AC4967B2_optimized_2000.jpeg" alt="Carter Wells" className="w-full h-full object-cover filter grayscale contrast-125 group-hover:grayscale-0 group-hover:contrast-100 transition-all duration-700" />
                            </div>

                            {/* Right Column: Title Block */}
                            <div className="flex flex-col items-center md:items-start text-center md:text-left">
                                <h1 className="font-emphasis text-[16vw] sm:text-7xl md:text-[8rem] tracking-tight uppercase leading-[0.85] mb-6 text-[#F8FAFC] drop-shadow-[0_0_15px_rgba(253,0,51,0.15)]">
                                    <span className="text-[#FD0033] opacity-50">[</span>DIRECTOR<span className="text-[#FD0033] opacity-50">]</span>
                                </h1>
                                <p className="font-data text-[#F8FAFC]/70 tracking-widest uppercase text-sm md:text-base mb-6 border-l-4 border-[#FD0033] pl-4">
                                    Carter Wells // <span className="text-[#F8FAFC]">ChannelScale Founder</span>
                                </p>
                                <p className="font-body text-[#FD0033] text-xl font-bold tracking-wide">
                                    Cinema-Grade Strategy. Data-Proven Results.
                                </p>
                            </div>
                        </div>

                        {/* Content Body */}
                        <div className="space-y-20">

                            {/* Text Module 01: SYSTEM ARCHITECTURE */}
                            <div className="about-animate grid grid-cols-1 md:grid-cols-12 gap-8 items-start">
                                <div className="md:col-span-4 relative z-10 border-l-4 border-[#FD0033] pl-3">
                                    <h2 className="font-emphasis text-4xl md:text-5xl text-[#F8FAFC] tracking-tight uppercase mb-2">System Architecture</h2>
                                    <span className="font-data text-[#FD0033] text-xs tracking-widest uppercase block">
                                        [MODULE_01] // PEDIGREE
                                    </span>
                                </div>
                                <div className="md:col-span-8 flex flex-col gap-6">
                                    <p className="font-body text-xl md:text-2xl text-[#F8FAFC] leading-relaxed font-light">
                                        I built ChannelScale to solve the operational drag of high-level content. Over the last two years, I have worked with top-tier production teams to architect systems that have combined for over <span className="text-[#F8FAFC] font-bold">1.4 Billion views</span> and <span className="text-[#F8FAFC] font-bold">3 Million subscribers</span>.
                                    </p>
                                    <p className="font-data text-sm md:text-base text-[#F8FAFC]/70 leading-relaxed bg-[#0A0A0B] p-6 border border-white/5 rounded-lg shadow-inner">
                                        From scaling a channel from 0 to 500k subscribers in a single year to managing the output for multi-million subscriber ecosystems, I have mastered the frameworks that drive massive attention and long-term retention.
                                    </p>
                                </div>
                            </div>

                            {/* Text Module 02: THE FOUNDATION */}
                            <div className="about-animate grid grid-cols-1 md:grid-cols-12 gap-8 items-start">
                                <div className="md:col-span-4 relative z-10 border-l-4 border-[#FD0033] pl-3">
                                    <h2 className="font-emphasis text-4xl md:text-5xl text-[#F8FAFC] tracking-tight uppercase mb-2">The Foundation</h2>
                                    <span className="font-data text-[#FD0033] text-xs tracking-widest uppercase block">
                                        [MODULE_02] // FOUNDATION
                                    </span>
                                </div>
                                <div className="md:col-span-8 flex flex-col gap-6">
                                    <p className="font-body text-xl md:text-2xl text-[#F8FAFC] leading-relaxed font-light">
                                        My approach is rooted in a Bachelor of Arts in Cinema and a decade of experience producing for organizations like the <span className="text-[#F8FAFC] font-bold">PGA Tour</span>, <span className="text-[#F8FAFC] font-bold">Iowa Hawkeye Football</span>, and the <span className="text-[#F8FAFC] font-bold">NWSL</span>. I’ve taken that professional rigor and applied it to the YouTube economy, generating <span className="text-[#F8FAFC] font-bold">six figures</span> in personal AdSense revenue from my own portfolio alone.
                                    </p>
                                    <div className="p-6 border-l-4 border-[#FD0033] bg-[#FD0033]/10">
                                        <p className="font-heading text-xl md:text-3xl text-[#F8FAFC] font-extrabold tracking-tight">
                                            Applying these strategies to a brand that can capitalize on lead generation makes this a <span className="text-[#FD0033] drop-shadow-[0_0_15px_rgba(253,0,51,0.8)]">no-brainer</span> for any high-level voice.
                                        </p>
                                    </div>
                                </div>
                            </div>

                            {/* QC Module: The Studio Standard */}
                            <div className="about-animate grid grid-cols-1 md:grid-cols-12 gap-8 items-center border-[1px] border-[#FD0033] p-8 md:p-12 rounded-xl relative overflow-hidden bg-[#0A0A0B] shadow-[0_0_40px_rgba(253,0,51,0.1)]">
                                <div className="absolute top-0 right-0 w-64 h-64 bg-[#FD0033] blur-[120px] opacity-10 pointer-events-none"></div>
                                <div className="md:col-span-4 relative z-10">
                                    <h2 className="font-emphasis text-4xl md:text-5xl text-[#F8FAFC] tracking-tight uppercase mb-2">The Studio Standard</h2>
                                    <span className="font-data text-[#FD0033] text-xs tracking-widest uppercase block border-l-4 border-[#FD0033] pl-3">
                                        [MODULE_03] // QC FOCUS
                                    </span>
                                </div>
                                <div className="md:col-span-8 relative z-10">
                                    <p className="font-body text-xl md:text-2xl text-[#F8FAFC] leading-relaxed font-light">
                                        ChannelScale operates as a specialized post-production studio. While our crew handles the heavy lifting of the edit, I personally review and finalize every strategy and frame. You get the output of a full team with the quality control of a single director.
                                    </p>
                                </div>
                            </div>

                        </div>

                        {/* Action Area */}
                        <div className="about-animate mt-32 flex justify-center pt-8">
                            <button
                                onClick={navigateToForm || (() => setCurrentPage('home'))}
                                className="group relative flex items-center justify-center px-10 py-6 border border-white/20 rounded hover:border-[#FD0033] bg-[#0A0A0B] transition-all duration-300 hover:shadow-[0_0_40px_rgba(253,0,51,0.4)] overflow-hidden"
                            >
                                <span className="relative z-10 font-data text-xs md:text-sm tracking-[0.2em] uppercase text-[#F8FAFC] group-hover:text-[#FD0033] transition-colors">
                                    [RETURN_TO_COMMAND_CENTER]
                                </span>
                                <div className="absolute inset-0 bg-[#FD0033]/5 -translate-x-full group-hover:translate-x-0 transition-transform duration-500 ease-out pointer-events-none"></div>
                            </button>
                        </div>

                    </div>
                </section>
            );
        };

        const SystemConfigurationsPage = ({ setCurrentPage, navigateToForm }) => {
            const pageRef = useRef(null);

            useLayoutEffect(() => {
                let ctx = gsap.context(() => {
                    gsap.from(".config-animate", {
                        y: 30,
                        opacity: 0,
                        duration: 0.8,
                        stagger: 0.15,
                        ease: "power3.out"
                    });
                }, pageRef);
                return () => ctx.revert();
            }, []);

            return (
                <section ref={pageRef} className="min-h-screen pt-32 pb-24 px-4 md:px-12 relative z-10 bg-[#0D0D0D] text-[#F8FAFC]">
                    <div className="max-w-5xl mx-auto">

                        {/* 1. Header */}
                        <div className="config-animate text-center mb-24 border-b border-white/10 pb-16">
                            <h1 className="font-emphasis text-[9.5vw] sm:text-6xl md:text-[6rem] lg:text-[7rem] tracking-tight uppercase leading-[0.85] mb-6 text-[#F8FAFC] drop-shadow-[0_0_15px_rgba(253,0,51,0.15)] break-words break-all sm:break-normal">
                                <span className="text-[#FD0033] opacity-50">[</span>SYSTEM_CONFIGURATIONS<span className="text-[#FD0033] opacity-50">]</span>
                            </h1>
                            <p className="font-data text-[#F8FAFC]/70 tracking-widest uppercase text-sm md:text-lg">
                                "Architected for Scale. Engineered for Results."
                            </p>
                        </div>

                        <div className="space-y-24">

                            {/* 2. Initialization Protocol */}
                            <div className="config-animate border border-[#FD0033] p-8 md:p-12 rounded-xl relative overflow-hidden bg-[#0A0A0B] shadow-[0_0_30px_rgba(253,0,51,0.2)]">
                                <div className="absolute top-0 right-0 w-64 h-64 bg-[#FD0033] blur-[120px] opacity-10 pointer-events-none"></div>
                                <div className="relative z-10">
                                    <h2 className="font-emphasis text-4xl md:text-5xl text-[#F8FAFC] tracking-tight uppercase mb-6">
                                        <span className="text-[#FD0033] opacity-50">[</span>SYSTEM_INITIALIZATION<span className="text-[#FD0033] opacity-50">]</span>
                                    </h2>
                                    <p className="font-body text-xl md:text-2xl text-[#F8FAFC] leading-relaxed font-light border-l-4 border-[#FD0033] pl-6">
                                        Every partnership begins here. We perform a total rework of your YouTube Infrastructure from Channel Banner to back-end metadata. We build the foundation then we run the engine. (One-Time Setup Fee Required)
                                    </p>
                                </div>
                            </div>

                            {/* 3. The Configurations */}
                            <div className="config-animate space-y-12">
                                <h3 className="font-data text-[#FD0033] text-sm md:text-base tracking-widest uppercase mb-8 border-b border-white/10 pb-4">
                                    SYS.01 // BUNDLED_TIERS
                                </h3>
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-8">

                                    {/* [THE_EDIT] */}
                                    <div className="bg-[#0A0A0B] border border-white/10 rounded-xl p-8 hover:border-[#FD0033] transition-all duration-300 hover:scale-105 hover:shadow-[0_0_30px_rgba(253,0,51,0.5)]">
                                        <h4 className="font-emphasis text-3xl tracking-wide uppercase mb-2 text-[#F8FAFC]">[THE_EDIT]</h4>
                                        <p className="font-body text-base text-[#F8FAFC]/80 leading-relaxed font-light mb-6 border-b border-white/10 pb-4">
